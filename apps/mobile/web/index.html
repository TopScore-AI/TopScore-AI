    <script>    // Aggressively unregister all service workers on every load to disable caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          console.log('Unregistering Service Worker to prevent caching:', registration.scope);
          registration.unregister();
        }
      });
    }

    // Function to hide splash screen
    function hideSplash() {
      const splash = document.getElementById('splash');
      if (splash) {
        console.log('Hiding splash screen');
        splash.classList.add('fade-out');
        setTimeout(() => {
          if (splash.parentNode) splash.remove();
        }, 400); 
      }
    }

    // Listen for Flutter's initialization completion
    window.addEventListener('load', function() {
      // We now wait for a custom 'app-ready' event dispatched from Flutter
      // after Auth and other core providers are initialized.
      window.addEventListener('app-ready', function() {
        console.log('App ready event received. Hiding splash.');
        hideSplash();
      });

      // Safety Fallback: If for some reason the app-ready event is never fired 
      // (e.g. fatal error or massive timeout), hide splash after 12 seconds 
      // so the user isn't stuck forever.
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash && !splash.classList.contains('fade-out')) {
          console.warn('App-ready timeout. Forcing splash hide.');
          hideSplash();
        }
      }, 12000);
    });

    // Global error listener to detect asset loading failures
    window.addEventListener('error', function (e) {
      // Ignore GA/GTM and other external scripts if they fail
      const src = e.target && (e.target.src || e.target.href);
      if (src && !src.includes('google-analytics') && !src.includes('googletagmanager')) {
        console.warn('Asset load failed:', src);
        // Only trigger SW clear for internal assets (same origin or assets folder)
        if (src.includes(window.location.origin) || src.includes('assets/')) {
          console.log('Marking service worker for cleanup on next reload.');
          document.cookie = "clear_sw=true; path=/; max-age=60";
        }
      }
    }, true);  </script>
