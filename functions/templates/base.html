<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            color: #1e293b;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 40px;
            margin-bottom: 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            padding: 40px 20px;
            text-align: center;
        }
        .header img {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        .content {
            padding: 40px 30px;
            line-height: 1.6;
        }
        .footer {
            background-color: #0f172a;
            padding: 40px 30px;
            color: #94a3b8;
            text-align: center;
        }
        .footer-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        .footer-logo img {
            width: 32px;
            height: 32px;
            margin-right: 8px;
        }
        .footer-logo span {
            color: #ffffff;
            font-weight: 700;
            font-size: 18px;
        }
        .tagline {
            font-size: 14px;
            margin-bottom: 24px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .app-links {
            margin-bottom: 24px;
        }
        .app-badge {
            display: inline-block;
            margin: 0 8px;
        }
        .app-badge img {
            height: 36px;
        }
        .legal {
            font-size: 12px;
            border-top: 1px solid #1e293b;
            padding-top: 24px;
        }
        .legal a {
            color: #94a3b8;
            text-decoration: none;
            margin: 0 8px;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #2563eb;
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://topscoreapp.ai/logo.png" alt="TopScore AI">
            <h1>TopScore AI</h1>
        </div>
        
        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <div class="footer">
            <div class="footer-logo">
                <img src="https://topscoreapp.ai/logo.png" alt="TopScore AI">
                <span>TopScore AI</span>
            </div>
            <p class="tagline">
                The #1 AI Study Companion in Kenya, empowering students with personalized KICD-compliant tools.
            </p>
            
            <div class="app-links">
                <a href="https://topscoreapp.ai/download" class="app-badge">
                    <img src="https://topscoreapp.ai/app-store-badge.svg" alt="App Store">
                </a>
                <a href="https://topscoreapp.ai/download" class="app-badge">
                    <img src="https://topscoreapp.ai/GetItOnGooglePlay_Badge_Web_color_English.svg" alt="Play Store">
                </a>
            </div>

            <div class="legal">
                <p>© 2026 TopScore AI. Built with ❤️ in Kenya.</p>
                <a href="https://topscoreapp.ai/privacy">Privacy Policy</a>
                <a href="https://topscoreapp.ai/terms">Terms of Service</a>
            </div>
        </div>
    </div>
</body>
</html>
